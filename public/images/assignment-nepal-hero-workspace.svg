<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Assignment Nepal 3D study workspace</title>
  <desc id="desc">A futuristic liquid-glass academic workspace with laptop, books, notes, floating panels, and subtle Nepal-inspired mountain shapes.</desc>
  <defs>
